name: Build MCP Plugins for Operit

on:
  push:
    paths:
      - 'build/src-*/**'
      - '.github/workflows/build-mcp-plugins.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - { name: obscura,             src: src-obscura,             bin: obscura,             args: '' }
          - { name: agentic_vision,      src: src-agentic_vision,      bin: agentic-vision-mcp,  args: '--bin agentic-vision-mcp', patch_deps: 'true' }
          - { name: rust_mcp_server,     src: src-rust_mcp_server,     bin: rust-mcp-server,     args: '-p rust-mcp-server' }
          - { name: mcp_proxy,           src: src-mcp_proxy,           bin: mcp-proxy,           args: '-p mcp-stdio-proxy' }
          - { name: rust_mcp_filesystem, src: src-rust-mcp-filesystem, bin: rust-mcp-filesystem, args: '' }
          - { name: rust_docs_mcp,       src: src-rust_docs_mcp,       bin: rust-docs-mcp,       args: '' }
          - { name: typemill,            src: src-typemill,            bin: mill,                args: '-p mill' }
          - { name: hotnews,             src: src-hotnews,             bin: hotnews,             args: '' }
          - { name: mcp_research_router, src: src-mcp_research_router, bin: mcp_research_router, args: '' }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install cross
        run: cargo install cross

      - name: Clone agentic-sdk (for agentic_vision)
        if: matrix.plugin.patch_deps == 'true'
        run: |
          cd build/${{ matrix.plugin.src }}
          # cross only mounts the project directory, so agentic-sdk must be inside it
          git clone --depth 1 https://github.com/agentralabs/agentic-sdk crates/agentic-sdk
          # Update workspace Cargo.toml to point to the in-project clone
          sed -i 's|path = "../agentic-sdk"|path = "crates/agentic-sdk"|' Cargo.toml
          cat Cargo.toml | grep agentic

      - name: Build ${{ matrix.plugin.name }}
        env:
          OPENSSL_NO_VENDOR: '0'
          PKG_CONFIG_ALLOW_CROSS: '1'
        run: |
          cd build/${{ matrix.plugin.src }}
          # Force vendored openssl for musl cross-compilation
          export OPENSSL_NO_VENDOR=0
          cross build --target aarch64-unknown-linux-musl --release ${{ matrix.plugin.args }}

      - name: Package ${{ matrix.plugin.name }}
        run: |
          mkdir -p dist
          cd build/${{ matrix.plugin.src }}
          cp target/aarch64-unknown-linux-musl/release/${{ matrix.plugin.bin }} ../../dist/
          cd ../../dist
          chmod +x ${{ matrix.plugin.bin }}
          # Generate index.js
          if [ "${{ matrix.plugin.name }}" = "obscura" ]; then
            TEMPLATE="../build/templates/index_obscura_base.js"
          else
            TEMPLATE="../build/templates/index_base.js"
          fi
          sed "s/__BIN__/${{ matrix.plugin.bin }}/g; s/__NAME__/${{ matrix.plugin.name }}/g" "$TEMPLATE" > index.js
          # Generate package.json
          echo "{\"name\":\"${{ matrix.plugin.name }}\",\"version\":\"1.0.0\",\"main\":\"index.js\",\"dependencies\":{}}" > package.json
          # Create ZIP
          zip -j ${{ matrix.plugin.name }}.zip ${{ matrix.plugin.bin }} index.js package.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.plugin.name }}
          path: dist/${{ matrix.plugin.name }}.zip
