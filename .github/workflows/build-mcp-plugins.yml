name: Build MCP Plugins for Operit

on:
  push:
    paths:
      - 'build/src-*/**'
      - '.github/workflows/build-mcp-plugins.yml'
  workflow_dispatch:

jobs:
  # Standard cross-compile jobs
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - { name: rust_mcp_server,     src: src-rust_mcp_server,     bin: rust-mcp-server,     args: '-p rust-mcp-server' }
          - { name: rust_mcp_filesystem, src: src-rust-mcp-filesystem, bin: rust-mcp-filesystem, args: '' }
          - { name: rust_docs_mcp,       src: src-rust_docs_mcp_v2,   bin: rust-docs-mcp,       args: '' }
          - { name: typemill,            src: src-typemill,            bin: mill,                args: '-p mill' }
          - { name: hotnews,             src: src-hotnews,             bin: hotnews,             args: '' }
          - { name: mcp_research_router, src: src-mcp_research_router, bin: mcp_research_router, args: '' }
          - { name: agentic_vision,      src: src-agentic_vision_simple, bin: agentic-vision-mcp, args: '' }
          - { name: mcp_proxy,           src: src-mcp_proxy_simple,      bin: mcp-proxy,         args: '' }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
      - run: cargo install cross
      - run: cd build/${{ matrix.plugin.src }} && cross build --target aarch64-unknown-linux-musl --release ${{ matrix.plugin.args }}
      - run: |
          mkdir -p dist
          cp build/${{ matrix.plugin.src }}/target/aarch64-unknown-linux-musl/release/${{ matrix.plugin.bin }} dist/
          chmod +x dist/${{ matrix.plugin.bin }}
          if [ "${{ matrix.plugin.name }}" = "obscura" ]; then T="build/templates/index_obscura_base.js"; else T="build/templates/index_base.js"; fi
          sed "s/__BIN__/${{ matrix.plugin.bin }}/g; s/__NAME__/${{ matrix.plugin.name }}/g" "$T" > dist/index.js
          # rust_mcp_filesystem needs --enable-roots
          if [ "${{ matrix.plugin.name }}" = "rust_mcp_filesystem" ]; then
            sed -i 's|spawn(BIN_PATH, \[\],|spawn(BIN_PATH, ["/"],|' dist/index.js
          fi
          echo "{\"name\":\"${{ matrix.plugin.name }}\",\"version\":\"1.0.0\",\"main\":\"index.js\",\"dependencies\":{}}" > dist/package.json
          zip -j dist/${{ matrix.plugin.name }}.zip dist/${{ matrix.plugin.bin }} dist/index.js dist/package.json
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.plugin.name }}
          path: dist/${{ matrix.plugin.name }}.zip

  # obscura: download prebuilt binary
  obscura:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download obscura prebuilt
        run: |
          mkdir -p dist
          curl -L -o /tmp/obscura.tar.gz "https://github.com/h4ckf0r0day/obscura/releases/latest/download/obscura-aarch64-linux.tar.gz"
          tar xzf /tmp/obscura.tar.gz -C /tmp/
          cp /tmp/obscura dist/
          chmod +x dist/obscura
          T="build/templates/index_obscura_base.js"
          sed "s/__BIN__/obscura/g; s/__NAME__/obscura/g" "$T" > dist/index.js
          echo '{"name":"obscura","version":"1.0.0","main":"index.js","dependencies":{}}' > dist/package.json
          zip -j dist/obscura.zip dist/obscura dist/index.js dist/package.json
      - uses: actions/upload-artifact@v4
        with:
          name: obscura
          path: dist/obscura.zip
