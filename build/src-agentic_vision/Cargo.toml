[workspace]
resolver = "2"
members = [
    "crates/agentic-vision",
    "crates/agentic-vision-mcp",
    "crates/agentic-vision-cli",
    "crates/agentic-vision-ffi",
]
exclude = ["runtime", "npm/wasm"]

[workspace.dependencies]
agentic-sdk = { version = "0.2.0", path = "../agentic-sdk" }

[workspace.package]
version = "0.3.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/agentralabs/agentic-vision"
homepage = "https://agentralabs.tech"
authors = ["Agentra Labs <contact@agentralabs.tech>"]
