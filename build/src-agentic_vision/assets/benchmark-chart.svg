<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" role="img" aria-label="AgenticVision benchmark chart in Agentra design system">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#c9c6bb"/>
    </pattern>
    <style><![CDATA[
      .mono { font-family:'IBM Plex Mono','JetBrains Mono',monospace; }
      .ink { fill:#111111; }
      .muted { fill:#6d6a63; }
      .accent { fill:#ea580c; }
      .frame { fill:#fffdf6; stroke:#1f1f1f; stroke-width:2; }
      .bar-fast { fill:#111111; }
      .bar-mid { fill:#4f4a43; }
      .bar-slow { fill:#ea580c; }
    ]]></style>
  </defs>

  <rect width="820" height="420" fill="#f2f1ea"/>
  <rect width="820" height="420" fill="url(#grid)"/>
  <line x1="18" y1="28" x2="802" y2="28" stroke="#1f1f1f"/>
  <text x="18" y="21" class="mono muted" font-size="11" letter-spacing="2">// BENCHMARK: VISUAL MEMORY OPERATIONS</text>

  <rect x="22" y="44" width="776" height="354" class="frame"/>
  <line x1="110" y1="86" x2="110" y2="340" stroke="#1f1f1f"/>
  <line x1="110" y1="340" x2="760" y2="340" stroke="#1f1f1f"/>

  <text x="72" y="96" class="mono muted" font-size="10" text-anchor="end">50ms</text>
  <text x="72" y="156" class="mono muted" font-size="10" text-anchor="end">25ms</text>
  <text x="72" y="216" class="mono muted" font-size="10" text-anchor="end">10ms</text>
  <text x="72" y="276" class="mono muted" font-size="10" text-anchor="end">5ms</text>
  <text x="72" y="336" class="mono muted" font-size="10" text-anchor="end">0ms</text>

  <!-- Capture: ~2ms -->
  <rect x="140" y="328" width="70" height="12" class="bar-fast"/>
  <!-- Query: ~3ms -->
  <rect x="248" y="322" width="70" height="18" class="bar-fast"/>
  <!-- Compare: ~8ms -->
  <rect x="356" y="299" width="70" height="41" class="bar-mid"/>
  <!-- Similar: ~12ms -->
  <rect x="464" y="274" width="70" height="66" class="bar-mid"/>
  <!-- OCR: ~35ms -->
  <rect x="572" y="162" width="70" height="178" class="bar-slow"/>
  <!-- Diff: ~18ms -->
  <rect x="680" y="248" width="70" height="92" class="bar-slow"/>

  <text x="175" y="360" class="mono ink" font-size="10" text-anchor="middle" letter-spacing="0.5">CAPTURE</text>
  <text x="283" y="360" class="mono ink" font-size="10" text-anchor="middle" letter-spacing="0.5">QUERY</text>
  <text x="391" y="360" class="mono ink" font-size="10" text-anchor="middle" letter-spacing="0.5">COMPARE</text>
  <text x="499" y="360" class="mono ink" font-size="10" text-anchor="middle" letter-spacing="0.5">SIMILAR</text>
  <text x="607" y="360" class="mono ink" font-size="10" text-anchor="middle" letter-spacing="0.5">OCR</text>
  <text x="715" y="360" class="mono ink" font-size="10" text-anchor="middle" letter-spacing="0.5">DIFF</text>

  <text x="44" y="377" class="mono muted" font-size="11" letter-spacing="1.5">FAST PATH: CAPTURE + QUERY | HEAVY PATH: OCR + PIXEL DIFF</text>
  <line x1="44" y1="384" x2="776" y2="384" stroke="#1f1f1f"/>
  <text x="44" y="398" class="mono ink" font-size="12" letter-spacing="1.2">REFERENCE: CRITERION RUNS ON APPLE M4 PRO, RUST RELEASE MODE</text>
  <circle cx="776" cy="394" r="4" class="accent"/>
</svg>
