[package]
name = "agentic-vision-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
description = "CLI tool for AgenticVision"
keywords = ["vision", "cli", "ai", "agent", "image"]
categories = ["command-line-utilities"]

[[bin]]
name = "avis"
path = "src/main.rs"

[dependencies]
agentic-vision = { path = "../agentic-vision", version = "0.3.0", features = ["cli"] }
agentic-vision-mcp = { path = "../agentic-vision-mcp", version = "0.3.0" }
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
rustyline = "14"
serde_json = "1"
serde = { version = "1", features = ["derive"] }
anyhow = "1"
