[workspace]
resolver = "3"
members = ["crates/*"]

[workspace.package]
edition = "2024"
rust-version = "1.93"
authors = ["Vaiz"]
license = "Unlicense"
repository = "https://github.com/Vaiz/rust-mcp-server"
homepage = "https://github.com/Vaiz/rust-mcp-server"

[workspace.dependencies]
# External dependencies
axum = { version = "0.8.9", default-features = false, features = ["tokio", "http1"] }
clap = { version = "4.5.40", default-features = false, features = ["std", "help", "error-context", "usage", "suggestions", "derive", "string"] }
ohno = { version = "0.3.8", features = ["app-err"] }
percent-encoding = "2.3.2"
rmcp = { version = "2.1.0", default-features = false, features = ["server", "transport-io"] }
schemars = "1.1.0"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
tokio = { version = "1.45.1", default-features = false, features = ["rt-multi-thread", "time"] }
tracing = "0.1.41"
tracing-appender = "0.2.3"
tracing-subscriber = { version = "0.3.20", features = ["env-filter"] }

# Dev dependencies
insta = "1.46.3"
